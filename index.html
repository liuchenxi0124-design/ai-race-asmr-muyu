<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 赛马 ASMR · 电子木鱼</title>
  <style>
    :root {
      --ink: #f8f3df;
      --muted: #c9bfa0;
      --panel: rgba(18, 23, 28, 0.78);
      --panel-strong: rgba(12, 16, 20, 0.92);
      --line: rgba(248, 243, 223, 0.18);
      --gold: #f3c969;
      --red: #e46d5d;
      --mint: #7fd8ba;
      --blue: #79b4ff;
      --track: #3d6250;
      --soil: #8b6041;
      --shadow: rgba(0, 0, 0, 0.35);
      font-family: Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #091015;
      color: var(--ink);
    }

    body {
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      color: var(--ink);
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .app {
      min-height: 100vh;
      position: relative;
      isolation: isolate;
      background:
        radial-gradient(circle at 12% 6%, rgba(243, 201, 105, 0.15), transparent 28%),
        linear-gradient(180deg, #08131c 0%, #142326 45%, #162015 100%);
    }

    .app::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent 72%);
    }

    .shell {
      width: min(1480px, 100%);
      margin: 0 auto;
      padding: clamp(16px, 2vw, 28px);
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(330px, 0.6fr);
      gap: clamp(14px, 2vw, 24px);
      min-height: 100vh;
    }

    .arena,
    .controls {
      min-width: 0;
    }

    .topbar {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 2px 14px;
    }

    .title {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 54px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: clamp(13px, 1.3vw, 15px);
      white-space: normal;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .pill {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .stadium {
      height: calc(100vh - 128px);
      min-height: 560px;
      border: 1px solid var(--line);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 24px 70px var(--shadow);
      background:
        linear-gradient(180deg, rgba(111, 148, 156, 0.25) 0 24%, transparent 24%),
        linear-gradient(180deg, #173247 0%, #12252c 23%, #234634 24%, #436144 100%);
    }

    .skyline {
      position: absolute;
      inset: 0 0 auto;
      height: 25%;
      background:
        linear-gradient(90deg, transparent 0 4%, rgba(255,255,255,0.07) 4% 5%, transparent 5% 12%, rgba(255,255,255,0.08) 12% 13%, transparent 13%),
        linear-gradient(180deg, rgba(10, 16, 22, 0.12), rgba(10, 16, 22, 0.55));
    }

    .moon {
      position: absolute;
      top: 26px;
      right: 9%;
      width: 78px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #fff1b8;
      box-shadow: 0 0 36px rgba(255, 241, 184, 0.45);
    }

    .grandstand {
      position: absolute;
      left: 0;
      right: 0;
      top: 18%;
      height: 14%;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.08) 0 11px, rgba(0,0,0,0.08) 11px 22px),
        linear-gradient(180deg, rgba(14,21,25,0.45), rgba(14,21,25,0.78));
      border-top: 1px solid rgba(255,255,255,0.12);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    #raceCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .race-hud {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 12px;
      pointer-events: none;
    }

    .commentary {
      min-height: 58px;
      padding: 13px 14px;
      background: rgba(8, 13, 16, 0.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.25);
      font-size: clamp(13px, 1.4vw, 16px);
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .leader {
      color: var(--gold);
      font-weight: 750;
    }

    .lap {
      width: 138px;
      padding: 14px;
      background: rgba(8, 13, 16, 0.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .lap strong {
      display: block;
      font-size: 30px;
      line-height: 1;
      color: var(--gold);
    }

    .lap span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .controls {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      box-shadow: 0 24px 70px var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 56px;
      padding: 13px 14px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .panel-body {
      padding: 14px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .main-btn,
    .ghost-btn,
    .icon-btn {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      white-space: nowrap;
    }

    .main-btn {
      background: linear-gradient(180deg, #d29343, #9f6034);
      color: #fff8e3;
      font-weight: 760;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 12px 28px rgba(0,0,0,0.22);
    }

    .ghost-btn,
    .icon-btn {
      background: rgba(255,255,255,0.07);
    }

    .ghost-btn:hover,
    .icon-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .horses {
      display: grid;
      gap: 8px;
      margin-top: 14px;
      max-height: 34vh;
      overflow: auto;
      padding-right: 2px;
    }

    .horse-card {
      display: grid;
      grid-template-columns: 16px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
    }

    .swatch {
      width: 14px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.28);
    }

    .horse-name {
      min-width: 0;
      font-weight: 740;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .horse-trait {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .odds {
      color: var(--gold);
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }

    .muyu-zone {
      display: grid;
      gap: 14px;
    }

    .muyu-wrap {
      min-height: 252px;
      display: grid;
      place-items: center;
      position: relative;
      background:
        radial-gradient(circle at center 58%, rgba(243, 201, 105, 0.18), transparent 48%),
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.12));
      border-bottom: 1px solid var(--line);
    }

    .muyu {
      width: min(210px, 64vw);
      aspect-ratio: 1.18;
      border-radius: 46% 54% 47% 53% / 52% 51% 49% 48%;
      position: relative;
      background:
        radial-gradient(circle at 39% 32%, rgba(255,255,255,0.36), transparent 11%),
        radial-gradient(circle at 58% 60%, rgba(64, 28, 14, 0.7), transparent 17%),
        linear-gradient(135deg, #9d5c31, #5b2c18 64%, #2f180f);
      border: 2px solid rgba(255,239,194,0.35);
      box-shadow:
        inset 0 14px 22px rgba(255,255,255,0.08),
        inset 0 -22px 28px rgba(0,0,0,0.32),
        0 28px 58px rgba(0,0,0,0.38);
    }

    .muyu::before {
      content: "";
      position: absolute;
      left: 21%;
      top: 16%;
      width: 58%;
      height: 26%;
      border-radius: 50%;
      border-top: 11px solid rgba(49, 20, 12, 0.55);
      transform: rotate(-4deg);
    }

    .muyu::after {
      content: "";
      position: absolute;
      right: -18px;
      top: 27%;
      width: 74px;
      height: 26px;
      border-radius: 999px;
      transform: rotate(18deg);
      background: linear-gradient(90deg, #d5a05c, #6b3a1f);
      border: 1px solid rgba(255,239,194,0.32);
      transform-origin: left center;
    }

    .muyu.hit {
      animation: hit 180ms ease;
    }

    @keyframes hit {
      0% { transform: scale(1); filter: brightness(1); }
      45% { transform: scale(0.96) rotate(-1deg); filter: brightness(1.22); }
      100% { transform: scale(1); filter: brightness(1); }
    }

    .merit {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--gold);
      font-size: 13px;
      min-height: 20px;
      white-space: nowrap;
    }

    .float-word {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #ffe6a3;
      font-weight: 850;
      pointer-events: none;
      animation: floatWord 850ms ease forwards;
      text-shadow: 0 2px 12px rgba(0,0,0,0.45);
    }

    @keyframes floatWord {
      from { opacity: 1; transform: translate(-50%, -20%) scale(0.92); }
      to { opacity: 0; transform: translate(-50%, -190%) scale(1.08); }
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .stat {
      min-height: 70px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.18);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .stat strong {
      display: block;
      color: var(--ink);
      font-size: clamp(19px, 2vw, 26px);
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
    }

    .stat span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .slider-group {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .slider {
      display: grid;
      grid-template-columns: 88px 1fr 42px;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--gold);
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 14px;
      padding: 5px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,0.18);
    }

    .segmented button {
      min-height: 36px;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
    }

    .segmented button.active {
      background: rgba(243, 201, 105, 0.18);
      color: var(--ink);
    }

    .log {
      margin-top: 14px;
      height: 124px;
      overflow: auto;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.18);
      border-radius: 8px;
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .log div + div {
      margin-top: 5px;
    }

    .sound-visualizer {
      display: flex;
      align-items: end;
      gap: 3px;
      height: 24px;
      width: 48px;
    }

    .sound-visualizer i {
      width: 5px;
      min-height: 5px;
      border-radius: 999px;
      background: var(--mint);
      animation: meter 900ms ease-in-out infinite;
      animation-play-state: paused;
    }

    .sound-visualizer.on i {
      animation-play-state: running;
    }

    .sound-visualizer i:nth-child(2) { animation-delay: 100ms; }
    .sound-visualizer i:nth-child(3) { animation-delay: 230ms; }
    .sound-visualizer i:nth-child(4) { animation-delay: 350ms; }
    .sound-visualizer i:nth-child(5) { animation-delay: 460ms; }

    @keyframes meter {
      0%, 100% { height: 6px; opacity: 0.55; }
      45% { height: 22px; opacity: 1; }
    }

    @media (max-width: 980px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .stadium {
        height: 64vh;
        min-height: 520px;
      }

      .controls {
        grid-template-rows: auto;
      }
    }

    @media (max-width: 620px) {
      .shell {
        padding: 12px;
      }

      .topbar {
        height: auto;
        align-items: flex-start;
        flex-direction: column;
      }

      .pill-row {
        justify-content: flex-start;
      }

      .stadium {
        min-height: 500px;
      }

      .race-hud {
        grid-template-columns: 1fr;
      }

      .lap {
        width: 100%;
      }

      .button-row,
      .stat-grid {
        grid-template-columns: 1fr;
      }

      .slider {
        grid-template-columns: 74px 1fr 36px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">
      <section class="arena" aria-label="AI赛马场">
        <div class="topbar">
          <div class="title">
            <h1>AI赛马 ASMR</h1>
            <p class="subtitle">七位选手正在被本地 AI 导播随机调度，马蹄、夜风、木鱼一起进入奇怪但安定的频道。</p>
          </div>
          <div class="pill-row" aria-label="状态标签">
            <span class="pill">Live Canvas</span>
            <span class="pill">Web Audio</span>
            <span class="pill">电子木鱼</span>
          </div>
        </div>

        <div class="stadium">
          <div class="skyline"></div>
          <div class="moon" aria-hidden="true"></div>
          <div class="grandstand" aria-hidden="true"></div>
          <canvas id="raceCanvas" aria-label="赛马动画画布"></canvas>
          <div class="race-hud">
            <div class="commentary" id="commentary">点击开始，Xixi、Haelyn、Luy、Tetri、Vivid、Tasia、Nora 会进入第一场 AI 夜赛。</div>
            <div class="lap">
              <strong id="lapText">0/3</strong>
              <span>当前圈数</span>
            </div>
          </div>
        </div>
      </section>

      <aside class="controls" aria-label="控制台">
        <section class="panel">
          <div class="panel-head">
            <h2>赛马控制</h2>
            <div class="sound-visualizer" id="visualizer" aria-hidden="true">
              <i></i><i></i><i></i><i></i><i></i>
            </div>
          </div>
          <div class="panel-body">
            <div class="button-row">
              <button class="main-btn" id="startBtn" type="button">▶ 开始比赛</button>
              <button class="ghost-btn" id="resetBtn" type="button">↻ 重置赛道</button>
            </div>
            <div class="segmented" aria-label="比赛速度">
              <button type="button" data-speed="0.78">慢速</button>
              <button type="button" class="active" data-speed="1">标准</button>
              <button type="button" data-speed="1.35">冲刺</button>
            </div>
            <div class="horses" id="horseList"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>ASMR 与木鱼</h2>
            <button class="icon-btn" id="soundBtn" type="button" title="开启或关闭环境音">🔊 声音</button>
          </div>
          <div class="muyu-zone">
            <div class="muyu-wrap" id="muyuWrap">
              <button class="muyu" id="muyuBtn" type="button" aria-label="敲电子木鱼"></button>
              <div class="merit" id="meritText">功德 +0</div>
            </div>
            <div class="panel-body">
              <div class="stat-grid">
                <div class="stat"><strong id="tapCount">0</strong><span>木鱼次数</span></div>
                <div class="stat"><strong id="winnerText">--</strong><span>上局冠军</span></div>
                <div class="stat"><strong id="moodText">禅定</strong><span>声场状态</span></div>
              </div>
              <div class="slider-group">
                <label class="slider">
                  <span>马蹄声</span>
                  <input id="hoofSlider" type="range" min="0" max="100" value="46" />
                  <output id="hoofOut">46</output>
                </label>
                <label class="slider">
                  <span>夜风</span>
                  <input id="windSlider" type="range" min="0" max="100" value="28" />
                  <output id="windOut">28</output>
                </label>
                <label class="slider">
                  <span>木鱼回响</span>
                  <input id="muyuSlider" type="range" min="0" max="100" value="72" />
                  <output id="muyuOut">72</output>
                </label>
              </div>
              <div class="log" id="log" aria-live="polite"></div>
            </div>
          </div>
        </section>
      </aside>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("raceCanvas");
    const ctx = canvas.getContext("2d");
    const commentary = document.getElementById("commentary");
    const lapText = document.getElementById("lapText");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const horseList = document.getElementById("horseList");
    const soundBtn = document.getElementById("soundBtn");
    const visualizer = document.getElementById("visualizer");
    const muyuBtn = document.getElementById("muyuBtn");
    const muyuWrap = document.getElementById("muyuWrap");
    const meritText = document.getElementById("meritText");
    const tapCount = document.getElementById("tapCount");
    const winnerText = document.getElementById("winnerText");
    const moodText = document.getElementById("moodText");
    const log = document.getElementById("log");
    const hoofSlider = document.getElementById("hoofSlider");
    const windSlider = document.getElementById("windSlider");
    const muyuSlider = document.getElementById("muyuSlider");
    const hoofOut = document.getElementById("hoofOut");
    const windOut = document.getElementById("windOut");
    const muyuOut = document.getElementById("muyuOut");

    const palette = ["#ffcf70", "#ff7f66", "#72d1ff", "#9be06e", "#c792ff", "#ff9bd2", "#7ee6c4"];
    const traits = ["先发观察型", "弯道爆发型", "稳态巡航型", "末段偷家型", "灵感乱流型", "节奏冥想型", "冷静计算型"];
    const names = ["Xixi", "Haelyn", "Luy", "Tetri", "Vivid", "Tasia", "Nora"];
    const horses = names.map((name, index) => ({
      name,
      color: palette[index],
      trait: traits[index],
      x: 0,
      lane: index,
      speed: 0.85 + Math.random() * 0.18,
      burst: 0,
      laps: 0,
      finished: false,
      bob: Math.random() * Math.PI * 2,
      odds: (1.8 + Math.random() * 4.9).toFixed(1)
    }));

    let width = 0;
    let height = 0;
    let running = false;
    let raceDone = false;
    let raceSpeed = 1;
    let lastTime = 0;
    let headlineAt = 0;
    let hoofAt = 0;
    let merit = 0;
    let audioOn = false;
    let audio;
    let windNode;
    let windGain;
    let masterGain;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = canvas.getBoundingClientRect();
      width = Math.max(320, Math.floor(rect.width));
      height = Math.max(420, Math.floor(rect.height));
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    function laneY(index) {
      const top = height * 0.36;
      const bottom = height * 0.88;
      return top + ((bottom - top) / (horses.length - 1)) * index;
    }

    function trackStart() {
      return width * 0.08;
    }

    function trackEnd() {
      return width * 0.91;
    }

    function raceLength() {
      return trackEnd() - trackStart();
    }

    function resetRace() {
      running = false;
      raceDone = false;
      horses.forEach((horse, index) => {
        horse.x = 0;
        horse.laps = 0;
        horse.finished = false;
        horse.burst = 0;
        horse.speed = 0.84 + Math.random() * 0.2 + (index % 2) * 0.025;
        horse.odds = (1.8 + Math.random() * 4.9).toFixed(1);
      });
      startBtn.textContent = "▶ 开始比赛";
      winnerText.textContent = "--";
      lapText.textContent = "0/3";
      commentary.innerHTML = "赛道已重置。AI 导播正在悄悄观察每匹马的微表情。";
      renderHorseList();
      addLog("赛道重置，所有选手回到起点。");
      draw();
    }

    function renderHorseList() {
      const ordered = [...horses].sort((a, b) => progressOf(b) - progressOf(a));
      horseList.innerHTML = ordered.map((horse, index) => `
        <div class="horse-card">
          <span class="swatch" style="background:${horse.color}"></span>
          <div>
            <div class="horse-name">${index + 1}. ${horse.name}</div>
            <div class="horse-trait">${horse.trait}</div>
          </div>
          <div class="odds">${horse.odds}</div>
        </div>
      `).join("");
    }

    function progressOf(horse) {
      return horse.laps * raceLength() + horse.x;
    }

    function leader() {
      return [...horses].sort((a, b) => progressOf(b) - progressOf(a))[0];
    }

    function startRace() {
      ensureAudio();
      if (raceDone) resetRace();
      running = !running;
      startBtn.textContent = running ? "Ⅱ 暂停比赛" : "▶ 继续比赛";
      addLog(running ? "比赛开始，马蹄声进入近景。" : "比赛暂停，赛道保留当前排序。");
      if (running && audioOn) startWind();
    }

    function update(time) {
      const dt = Math.min(48, time - lastTime || 16) / 16.67;
      lastTime = time;
      if (running && !raceDone) {
        horses.forEach((horse) => {
          horse.bob += 0.18 * dt * raceSpeed;
          if (Math.random() < 0.006 * dt) horse.burst = 35 + Math.random() * 70;
          const aiPulse = Math.sin(time / 580 + horse.lane * 1.7) * 0.045;
          const drift = (Math.random() - 0.48) * 0.018;
          const burstBoost = horse.burst > 0 ? 0.34 : 0;
          horse.burst = Math.max(0, horse.burst - dt);
          horse.x += (horse.speed + aiPulse + drift + burstBoost) * 1.75 * dt * raceSpeed;
          if (horse.x >= raceLength()) {
            horse.x -= raceLength();
            horse.laps += 1;
            addLog(`${horse.name} 完成第 ${horse.laps} 圈。`);
          }
          if (horse.laps >= 3 && !horse.finished) finishRace(horse);
        });

        const lead = leader();
        lapText.textContent = `${Math.min(lead.laps, 3)}/3`;
        if (time > headlineAt) {
          headlineAt = time + 2100 + Math.random() * 1600;
          makeCommentary(lead);
        }
        if (audioOn && time > hoofAt) {
          hoofAt = time + Math.max(90, 210 - raceSpeed * 52);
          playHoof();
        }
        renderHorseList();
      }
      draw();
      requestAnimationFrame(update);
    }

    function finishRace(winner) {
      raceDone = true;
      running = false;
      winner.finished = true;
      startBtn.textContent = "▶ 再跑一局";
      winnerText.textContent = winner.name;
      commentary.innerHTML = `<span class="leader">${winner.name}</span> 冲线！AI 导播判定这是一场“木鱼共振型胜利”。`;
      addLog(`${winner.name} 成为本局冠军。`);
      if (audioOn) {
        playBell();
        setTimeout(() => playMuyu(true), 130);
      }
    }

    function makeCommentary(lead) {
      const close = [...horses].sort((a, b) => progressOf(b) - progressOf(a))[1];
      const lines = [
        `<span class="leader">${lead.name}</span> 正在领跑，步频像刚训练过的提示词一样稳定。`,
        `${close.name} 贴近内道，试图用 ${close.trait} 干扰 ${lead.name} 的节奏。`,
        `AI 导播发现 ${lead.name} 的冲刺曲线变亮，观众席进入低声白噪。`,
        `${lead.name} 的马蹄声更靠近耳边，ASMR 浓度上升。`,
        `${close.name} 在弯道外侧加速，局面开始有点玄学。`
      ];
      commentary.innerHTML = lines[Math.floor(Math.random() * lines.length)];
    }

    function draw() {
      if (!width || !height) return;
      ctx.clearRect(0, 0, width, height);
      drawTrack();
      horses.forEach(drawHorse);
      drawFinishLine();
      drawMist();
    }

    function drawTrack() {
      const top = height * 0.32;
      const bottom = height * 0.93;
      const start = trackStart();
      const end = trackEnd();
      const laneGap = (bottom - top) / horses.length;

      const trackGradient = ctx.createLinearGradient(0, top, 0, bottom);
      trackGradient.addColorStop(0, "#4a7a59");
      trackGradient.addColorStop(0.58, "#7c6041");
      trackGradient.addColorStop(1, "#4f3827");
      ctx.fillStyle = trackGradient;
      ctx.fillRect(0, top, width, bottom - top);

      ctx.fillStyle = "rgba(255, 255, 255, 0.09)";
      for (let i = 0; i <= horses.length; i++) {
        const y = top + i * laneGap;
        ctx.fillRect(0, y, width, 1);
      }

      ctx.strokeStyle = "rgba(255, 231, 171, 0.5)";
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 9]);
      ctx.beginPath();
      ctx.moveTo(start, top + 8);
      ctx.lineTo(start, bottom - 8);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
      for (let i = 0; i < 18; i++) {
        const x = (i / 17) * width;
        ctx.fillRect(x, bottom - 24, 36, 2);
      }
    }

    function drawFinishLine() {
      const end = trackEnd();
      const top = height * 0.32;
      const bottom = height * 0.93;
      const size = 10;
      for (let y = top; y < bottom; y += size) {
        for (let i = 0; i < 2; i++) {
          ctx.fillStyle = ((Math.floor(y / size) + i) % 2 === 0) ? "#f8f3df" : "#1b1b1b";
          ctx.fillRect(end + i * size, y, size, size);
        }
      }
      ctx.fillStyle = "rgba(248, 243, 223, 0.88)";
      ctx.font = "700 12px Segoe UI, sans-serif";
      ctx.fillText("FINISH", end - 18, top - 10);
    }

    function drawMist() {
      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "#dff8ff";
      const t = performance.now() / 1300;
      for (let i = 0; i < 6; i++) {
        const x = ((t * 38 + i * 190) % (width + 220)) - 110;
        const y = height * (0.28 + i * 0.018);
        ctx.beginPath();
        ctx.ellipse(x, y, 130, 10 + i, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawHorse(horse) {
      const x = trackStart() + horse.x;
      const y = laneY(horse.lane);
      const bob = Math.sin(horse.bob) * 4;

      ctx.save();
      ctx.translate(x, y + bob);
      ctx.fillStyle = "rgba(0,0,0,0.26)";
      ctx.beginPath();
      ctx.ellipse(8, 22, 32, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = horse.color;
      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(-21, -13, 47, 25, 10);
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(30, -15, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#1c1712";
      ctx.beginPath();
      ctx.moveTo(20, -14);
      ctx.lineTo(10, -28);
      ctx.lineTo(28, -20);
      ctx.fill();

      ctx.strokeStyle = "#18120c";
      ctx.lineWidth = 4;
      const legPhase = Math.sin(horse.bob);
      [[-14, 1], [0, -1], [15, -1], [25, 1]].forEach(([lx, dir]) => {
        ctx.beginPath();
        ctx.moveTo(lx, 9);
        ctx.lineTo(lx + legPhase * 7 * dir, 27);
        ctx.stroke();
      });

      ctx.fillStyle = "#fff8e3";
      ctx.font = "800 12px Segoe UI, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(horse.name, 4, -29);
      ctx.restore();
    }

    function ensureAudio() {
      if (audio) return;
      audio = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audio.createGain();
      masterGain.gain.value = 0.62;
      masterGain.connect(audio.destination);
      setupWind();
    }

    function setupWind() {
      const bufferSize = audio.sampleRate * 2;
      const buffer = audio.createBuffer(1, bufferSize, audio.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.23;
      windNode = audio.createBufferSource();
      windNode.buffer = buffer;
      windNode.loop = true;
      const filter = audio.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.value = 520;
      windGain = audio.createGain();
      windGain.gain.value = 0;
      windNode.connect(filter).connect(windGain).connect(masterGain);
      windNode.start();
    }

    function startWind() {
      if (!audio || !windGain) return;
      windGain.gain.cancelScheduledValues(audio.currentTime);
      windGain.gain.linearRampToValueAtTime(Number(windSlider.value) / 100 * 0.18, audio.currentTime + 0.5);
    }

    function stopWind() {
      if (!audio || !windGain) return;
      windGain.gain.cancelScheduledValues(audio.currentTime);
      windGain.gain.linearRampToValueAtTime(0, audio.currentTime + 0.35);
    }

    function playHoof() {
      if (!audio) return;
      const volume = Number(hoofSlider.value) / 100;
      const now = audio.currentTime;
      [0, 0.052].forEach((delay) => {
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        const filter = audio.createBiquadFilter();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(92 + Math.random() * 16, now + delay);
        filter.type = "lowpass";
        filter.frequency.value = 260;
        gain.gain.setValueAtTime(0.0001, now + delay);
        gain.gain.exponentialRampToValueAtTime(0.14 * volume, now + delay + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + 0.09);
        osc.connect(filter).connect(gain).connect(masterGain);
        osc.start(now + delay);
        osc.stop(now + delay + 0.11);
      });
    }

    function playMuyu(soft = false) {
      ensureAudio();
      const now = audio.currentTime;
      const volume = Number(muyuSlider.value) / 100 * (soft ? 0.55 : 1);
      const osc = audio.createOscillator();
      const gain = audio.createGain();
      const filter = audio.createBiquadFilter();
      osc.type = "sine";
      osc.frequency.setValueAtTime(226, now);
      osc.frequency.exponentialRampToValueAtTime(132, now + 0.18);
      filter.type = "bandpass";
      filter.frequency.value = 420;
      filter.Q.value = 3.2;
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.62 * volume, now + 0.006);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);
      osc.connect(filter).connect(gain).connect(masterGain);
      osc.start(now);
      osc.stop(now + 0.6);

      const knock = audio.createOscillator();
      const knockGain = audio.createGain();
      knock.type = "square";
      knock.frequency.value = 88;
      knockGain.gain.setValueAtTime(0.0001, now);
      knockGain.gain.exponentialRampToValueAtTime(0.08 * volume, now + 0.004);
      knockGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
      knock.connect(knockGain).connect(masterGain);
      knock.start(now);
      knock.stop(now + 0.1);
    }

    function playBell() {
      if (!audio) return;
      const now = audio.currentTime;
      [523, 659, 784].forEach((freq, i) => {
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, now + i * 0.05);
        gain.gain.exponentialRampToValueAtTime(0.08, now + i * 0.05 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
        osc.connect(gain).connect(masterGain);
        osc.start(now + i * 0.05);
        osc.stop(now + 1.25);
      });
    }

    function toggleSound() {
      ensureAudio();
      if (audio.state === "suspended") audio.resume();
      audioOn = !audioOn;
      soundBtn.textContent = audioOn ? "🔈 静音" : "🔊 声音";
      visualizer.classList.toggle("on", audioOn);
      moodText.textContent = audioOn ? "沉浸" : "禅定";
      if (audioOn) {
        startWind();
        playBell();
        addLog("环境音已开启。");
      } else {
        stopWind();
        addLog("环境音已关闭。");
      }
    }

    function hitMuyu() {
      ensureAudio();
      if (audio.state === "suspended") audio.resume();
      merit += 1;
      tapCount.textContent = merit;
      meritText.textContent = `功德 +${merit}`;
      muyuBtn.classList.remove("hit");
      void muyuBtn.offsetWidth;
      muyuBtn.classList.add("hit");
      const word = document.createElement("div");
      word.className = "float-word";
      word.textContent = ["静", "稳", "赢", "冲", "妙"][merit % 5];
      word.style.left = `${42 + Math.random() * 16}%`;
      muyuWrap.appendChild(word);
      setTimeout(() => word.remove(), 900);
      playMuyu(false);
      if (running) {
        const chosen = horses[merit % horses.length];
        chosen.burst += 22;
        addLog(`木鱼共振：${chosen.name} 获得短暂节奏加成。`);
      }
    }

    function addLog(text) {
      const item = document.createElement("div");
      const time = new Date().toLocaleTimeString("zh-CN", { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
      item.textContent = `${time} · ${text}`;
      log.prepend(item);
      while (log.children.length > 32) log.removeChild(log.lastChild);
    }

    document.querySelectorAll("[data-speed]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-speed]").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        raceSpeed = Number(button.dataset.speed);
        addLog(`比赛速度切换为${button.textContent}。`);
      });
    });

    [hoofSlider, windSlider, muyuSlider].forEach((slider) => {
      slider.addEventListener("input", () => {
        hoofOut.value = hoofSlider.value;
        windOut.value = windSlider.value;
        muyuOut.value = muyuSlider.value;
        if (audioOn) startWind();
      });
    });

    startBtn.addEventListener("click", startRace);
    resetBtn.addEventListener("click", resetRace);
    soundBtn.addEventListener("click", toggleSound);
    muyuBtn.addEventListener("click", hitMuyu);
    window.addEventListener("resize", resize);

    renderHorseList();
    resize();
    addLog("页面载入完成。");
    requestAnimationFrame(update);
  </script>
</body>
</html>
